name: Update minute_minute Submodule

on:
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false # We'll update it manually
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update minute_minute submodule
        run: |
          git submodule update --init minute_minute
          git submodule update --remote minute_minute

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add minute_minute
            git commit -m "Update minute_minute submodule to latest master"
            git push
          else
            echo "No changes to submodule minute_minute"
          fi
